<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#ffffff" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#020817" media="(prefers-color-scheme: dark)" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="track.it" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="apple-touch-icon" href="/apple-touch-icon-180x180.png" />
    <title>track.it</title>
    <script>
      // Apply theme skin + accent before paint to avoid flash.
      // Mirror of src/lib/theme.js — keep the two in sync.
      (function () {
        var el = document.documentElement;
        var darkSkins = { midnight:1, slate:1, nord:1, forest:1, ocean:1, dracula:1, rosepine:1 };
        var lightSkins = { sepia:1, solarized:1, mono:1 };
        var theme = localStorage.getItem('theme') || 'system';
        if (theme === 'dark' || (theme === 'system' && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          el.classList.add('dark');
        } else if (darkSkins[theme] || lightSkins[theme]) {
          el.classList.add('theme-' + theme);
          if (darkSkins[theme]) el.classList.add('dark');
        }
        var p = localStorage.getItem('palette');
        var legacy = { emerald:'#10b981', violet:'#8b5cf6', rose:'#f43f5e', amber:'#f59e0b', cyan:'#06b6d4' };
        var hex = (p && p[0] === '#') ? p : (legacy[p] || null);
        if (hex) {
          var hsl = hexToHsl(hex);
          if (hsl) {
            el.style.setProperty('--primary', hsl);
            el.style.setProperty('--ring', hsl);
            el.style.setProperty('--primary-foreground', lum(hex) > 0.6 ? '222 47% 11%' : '210 40% 98%');
          }
        }
        function hexToHsl(H) {
          var r = parseInt(H.slice(1,3),16)/255, g = parseInt(H.slice(3,5),16)/255, b = parseInt(H.slice(5,7),16)/255;
          var max = Math.max(r,g,b), min = Math.min(r,g,b), h = 0, s = 0, l = (max+min)/2;
          if (max !== min) { var d = max-min; s = l > 0.5 ? d/(2-max-min) : d/(max+min);
            if (max===r) h=(g-b)/d+(g<b?6:0); else if (max===g) h=(b-r)/d+2; else h=(r-g)/d+4; h/=6; }
          return Math.round(h*360)+' '+Math.round(s*100)+'% '+Math.round(l*100)+'%';
        }
        function lum(H) { return 0.2126*parseInt(H.slice(1,3),16)/255 + 0.7152*parseInt(H.slice(3,5),16)/255 + 0.0722*parseInt(H.slice(5,7),16)/255; }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
