<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Source-of-truth mark. PNG app icons are generated from this via
       `npx pwa-assets-generator` (see pwa-assets.config.js). Background stays
       flat brand blue so maskable/apple padding blends seamlessly. -->
  <rect width="512" height="512" fill="#2563eb"/>
  <g>
    <!-- wallet body -->
    <rect x="112" y="160" width="288" height="204" rx="40" fill="#ffffff"/>
    <!-- flap fold across the top -->
    <path d="M112 218 h288 v18 H112 z" fill="#bfdbfe"/>
    <!-- pass-through card pocket -->
    <rect x="296" y="256" width="104" height="72" rx="24" fill="#2563eb"/>
    <circle cx="348" cy="292" r="14" fill="#ffffff"/>
  </g>
</svg>
